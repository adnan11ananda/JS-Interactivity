<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style
>
    body {
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
    }
</style>

<script>
    const greeting = "Hello,";
    var nama_user = "Adnan A.";
    var Jarak = 10;
    console.log(greeting, nama_user,"!");

// === BOOLEAN ===
const sudahLulus = true;
const hujan = false;

// === NULL vs UNDEFINED ===
let dataPeta = null;       // sengaja dikosongkan (data belum diambil)
let koordinat;              // undefined — belum diberi nilai sama sekali

console.log("Peta :", dataPeta);      // null

// === ARRAY === (kumpulan data berurutan)
const transportasi = ["Transjakarta", "MRT", "LRT", "KRL"];
const angka = [10, 20, 30];

console.log(transportasi[0]);  // "Transjakarta" — index dimulai dari 0!
console.log(transportasi[3]);  // "KRL"
console.log(transportasi.length); // 4 — jumlah item

// === OBJECT === (data key-value)
const mahasiswa = {
  nama: "Rifqi",
  umur: 21,
  jurusan: "Ilmu Informasi Geografi",
  aktif: true
};

console.log(mahasiswa.nama);     // "Rifqi" — akses dengan titik (dot notation)
console.log(mahasiswa["jurusan"]); // "Ilmu Informasi Geografi" — bracket notation

// CONTOH PAKAI CONST
    const umur = 23;


    // TIDAK BOLEH DILAKUKAN SEPERTI INI KARENA CONST TIDAK BOLEH DIUBAH (AKAN ERROR)
    // umur = 24;


    const alamat_lengkap_tempat_tinggal = "Bogor";
    const negara = "indonesia";


    // CONTOH PAKAI LET
    let nama = "Rifqi";


    nama = "Naufal";


    // CONTOH PAKAI VAR
    var tinggi = 165;


    // -----------------------console.log-----------------------
    console.log(10000000); // MENAMPILKAN ANGKA 10000000 DI CONSOLE
    console.log(umur, nama, nama, nama, nama); // MENAMPILKAN VARIABEL UMUR


    // -----------------------TIPE DATA ------------------------
    // -----------------------TIPE DATA PRIMITIF------------------------
    // TIPE DATA STRING
    const nama_lengkap = "Rifqi Naufal";


    // TIPE DATA NUMBER
    const umur_saya = 23;


    // TIPE DATA BOOLEAN
    const apakah_saya_laki_laki = true; // benar
    const apakah_saya_perempuan = false; //salah


    // TIPE DATA NULL
    const uang_saya = null; // kosong


    // TIPE DATA UNDEFINED
    let gatau_ini_apa; // undefined


    // --------------------------------TIPE DATA NON PRIMITIF------------------------
    // TIPE DATA ARRAY
    const barang_barang_saya = []; // ARRAY KOSONG
    const wishlist_barang_yang_ingin_dibeli = ["mobil", "motor", "rumah"]; // ARRAY ISI
    const identitas = ["Rifqi", 23, 165, 100000];


    // CONTOH MANGGIL ARRAY
    console.log(wishlist_barang_yang_ingin_dibeli); // MANGGIL ARRAY kESALURUHAN
    console.log(wishlist_barang_yang_ingin_dibeli[1]); // MANGGIL ARRAY KE 2 (MOTOR)
    console.log(wishlist_barang_yang_ingin_dibeli[2]); // MANGGIL ARRAY KE 2 (MOTOR)


    // TIPE DATA OBJECT
    // {key : value}
    const identitas_nama = { nama: "Rifqi" };
    const identas_umur = { umur: 23 };
    const identitas_lengkap = { nama: "Rifqi", umur: 23 };


    // CONTOH MANGGIL OBJECT
    console.log(identitas_lengkap.nama);
    console.log(identitas_lengkap["nama"]);


    // -----------------------OPERASI MATEMATIKA------------------------
    // -----------------------PENJUMLAHAN------------------------
    1 + 1; // menjumlahkan 1 + 1 = 2


    const uang_saya_kemarin = 1000;
    const gaji_saya_hari_ini = 2000;


    const total_uang_saya = uang_saya_kemarin + gaji_saya_hari_ini;
    console.log("TOTAL UANG SAYA:", total_uang_saya); // MENAMPILKAN TOTAL UANG SAYA DI CONSOLE


    // -----------------------PENGURANGAN------------------------
    1 - 1; // mengurangkan 1 - 1 = 0


    // -----------------------PERKALIAN------------------------
    2 * 2; // mengalikan 2 * 2 = 4


    // -----------------------PEMBAGIAN------------------------
    4 / 2; // membagi 4 / 2 = 2


    // OPERATOR PERBANDINGAN
    console.log(10 > 5); // true  — lebih besar
    console.log(10 < 5); // false — lebih kecil
    console.log(10 >= 10); // true  — lebih besar atau sama
    console.log(10 <= 5); // false — lebih kecil atau sama


    // Perbedaan penting: == vs ===
    console.log(5 == "5"); // true  — hanya bandingkan NILAI (type coercion)
    console.log(5 === "5"); // false — bandingkan NILAI + TIPE DATA
    console.log(5 === 5); // true  — nilai sama, tipe sama


    console.log(5 != 10); // true — nilai beda


    // OPERATOR LOGIKA
    const pria = true;
    const muda = false;
    const kaya = true;


    // AKU MENCARI ORANG YANG PRIA DAN JUGA MUDA
    // && (AND) — true jika SEMUA kondisi true
    console.log("apakah dia pria dan muda?", pria && muda); // false karena salah satunya salah


    // // || (OR) — true jika SALAH SATU kondisi true
    console.log("apakah dia muda atau kaya?", muda || kaya); // true


    // // ! (NOT) — membalik nilai
    console.log(!muda); // false (kebalikan dari true)


    // Contoh kombinasi:
    const nilai = 85;
    const hadir = true;

</script>
